<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <style>
        /* CSS styling section - Improved */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .profile-card {
            background: white;
            padding: 30px;
            width: 320px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background-color: #e0e0e0;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .name {
            font-size: 26px;
            font-weight: 700;
            margin: 10px 0 5px;
            color: #333;
        }

        .stream {
            color: #764ba2;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .bio {
            font-size: 15px;
            line-height: 1.6;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- <div> structure -->
    <div class="profile-card">
        <div class="profile-img">Photo</div>
        <div class="name">Alex Johnson</div>
        <div class="stream">Computer Science</div>
        <div class="bio">Aspiring software engineer with a passion for web development and artificial intelligence. Loves building things that scale.</div>
    </div>
</body>
</html>
